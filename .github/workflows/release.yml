name: Release

on:
  release:
    types:
      - published

permissions: {}

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version in manifest.json
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          jq --arg v "$version" '.version = $v' \
            "${{ github.workspace }}/custom_components/soil_temperature/manifest.json" > tmp.json \
            && mv tmp.json "${{ github.workspace }}/custom_components/soil_temperature/manifest.json"

      - name: Create zip archive
        run: |
          cd "${{ github.workspace }}/custom_components/soil_temperature"
          zip -r soil_temperature.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: custom_components/soil_temperature/soil_temperature.zip
